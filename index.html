<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚无主义与人格鉴定系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">
    <audio id="emo-audio" src="ding.mp4" preload="auto"></audio>

    <div class="container">
        <header id="welcome-section">
            <h1>Commit Your Soul</h1>
            <p class="subtitle">身份识别中...</p>
            <div class="user-input-area">
                <input type="text" id="username" placeholder="输入你的赛博代号..." />
                <button class="btn-primary" onclick="startSystem()">启动系统</button>
            </div>
        </header>

        <section id="choice-section" class="hidden">
            <h2 id="hello-user">你好</h2>
            <div class="nav-buttons">
                <button class="btn-void" onclick="startSurvey('emo')">虚无主义状态检查 (20题)</button>
                <button class="btn-void" onclick="startSurvey('mbti')">MBTI 国际版核心测试 (28题)</button>
                <button class="btn-outline" onclick="showProfile()">返回个人主页</button>
            </div>
        </section>

        <section id="survey-section" class="hidden">
            <div class="header-info">
                <span id="survey-title">测试中...</span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>
            <form id="survey-form">
                <div id="questions-container"></div>
                <button type="button" class="btn-primary" onclick="processSubmit()">分析人格数据</button>
            </form>
        </section>

        <section id="profile-section" class="hidden">
            <h2>个人中心</h2>
            <div class="profile-card">
                <p><strong>代号：</strong> <span id="p-name">--</span></p>
                <p><strong>MBTI人格：</strong> <span id="p-mbti" class="tag">未测试</span></p>
                <p><strong>精神状态：</strong> <span id="p-status">未鉴定</span></p>
                <p><strong>系统耗时：</strong> <span id="p-time">0s</span></p>
            </div>
            <div class="nav-buttons">
                <button onclick="switchSection('choice-section')">开启新测试</button>
                <button class="btn-outline" onclick="showLeaderboard()">查看排行榜</button>
                <button class="btn-outline" style="color:#f85149" onclick="resetAll()">注销灵魂</button>
            </div>
        </section>

        <section id="leaderboard-section" class="hidden">
            <h2>全球虚无排行</h2>
            <ul id="leaderboard-list"></ul>
            <button class="btn-outline" onclick="showProfile()">返回</button>
        </section>
    </div>

    <script>
        // 题目数据
        const emoQuestions = [
            { q: "起床后的第一念头？", a: "尿急", b: "还没活够", c: "为什么会有早八" },
            // ... (此处省略部分以保持简洁，实际使用时请填满20题)
            { q: "最后，你现在的感觉？", a: "想干饭", b: "想睡觉", c: "我不应该在这里" }
        ];

        const mbtiQuestions = [
            { q: "在聚会上，你通常：", a: "与多人互动（E）", b: "与少数熟人交谈（I）", dim: "EI" },
            { q: "你更倾向于：", a: "务实，看重事实（S）", b: "想象，看重可能（N）", dim: "SN" },
            { q: "做决定时，你更看重：", a: "逻辑与公平（T）", b: "情感与和谐（F）", dim: "TF" },
            { q: "你更喜欢：", a: "有计划的生活（J）", b: "随性、开放的选择（P）", dim: "JP" },
            // 后续24道题逻辑类似... (为了代码长度，这里演示核心算法)
        ];

        let state = {
            user: localStorage.getItem('emo_user') || "",
            mbti: localStorage.getItem('mbti_res') || "未测试",
            emo: localStorage.getItem('emo_res') || "未鉴定",
            startTime: 0,
            currentType: ""
        };

        function startSystem() {
            const name = document.getElementById('username').value.trim();
            if (!name && !state.user) return alert("灵魂需要名字");
            state.user = state.user || name;
            localStorage.setItem('emo_user', state.user);
            showProfile();
        }

        function startSurvey(type) {
            state.currentType = type;
            state.startTime = Date.now();
            const container = document.getElementById('questions-container');
            container.innerHTML = "";
            const list = type === 'mbti' ? mbtiQuestions : emoQuestions;
            
            list.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'question-group';
                div.innerHTML = `<label>${i+1}. ${item.q}</label>
                    <div class="options">
                        <input type="radio" name="q${i}" value="A" id="q${i}a" onclick="updateProgress(${list.length})"> <label for="q${i}a">${item.a}</label><br>
                        <input type="radio" name="q${i}" value="B" id="q${i}b" onclick="updateProgress(${list.length})"> <label for="q${i}b">${item.b}</label>
                    </div>`;
                container.appendChild(div);
            });
            document.getElementById('survey-title').innerText = type === 'mbti' ? "MBTI 维度扫描" : "虚无状态提取";
            switchSection('survey-section');
        }

        function updateProgress(total) {
            const checked = document.querySelectorAll('input[type="radio"]:checked').length;
            document.getElementById('progress').style.width = (checked / total) * 100 + '%';
        }

        function processSubmit() {
            const checked = document.querySelectorAll('input[type="radio"]:checked');
            const total = state.currentType === 'mbti' ? mbtiQuestions.length : emoQuestions.length;
            
            if (checked.length < total) return alert("逃避是没用的，请填完。");
            
            const duration = ((Date.now() - state.startTime) / 1000).toFixed(1);
            document.getElementById('emo-audio').play().catch(()=>{});

            if (state.currentType === 'mbti') {
                // MBTI 简易计分逻辑
                let res = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
                checked.forEach((input, i) => {
                    const dim = mbtiQuestions[i].dim;
                    const choice = input.value === 'A' ? dim[0] : dim[1];
                    res[choice]++;
                });
                const finalMBTI = (res.E >= res.I ? "E" : "I") + (res.S >= res.N ? "S" : "N") + (res.T >= res.F ? "T" : "F") + (res.J >= res.P ? "J" : "P");
                state.mbti = finalMBTI;
                localStorage.setItem('mbti_res', finalMBTI);
            } else {
                state.emo = "深度虚无"; // 简化逻辑
                localStorage.setItem('emo_res', state.emo);
            }
            
            localStorage.setItem('last_time', duration + "s");
            showProfile();
        }

        function showProfile() {
            document.getElementById('p-name').innerText = state.user;
            document.getElementById('p-mbti').innerText = localStorage.getItem('mbti_res') || "未测试";
            document.getElementById('p-status').innerText = localStorage.getItem('emo_res') || "未鉴定";
            document.getElementById('p-time').innerText = localStorage.getItem('last_time') || "0s";
            switchSection('profile-section');
        }

        function switchSection(id) {
            document.querySelectorAll('section, header').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function resetAll() {
            if(confirm("确定要删除此灵魂的所有存档吗？")) {
                localStorage.clear();
                location.reload();
            }
        }

        function showLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = `<li><span>用户</span><span>人格</span><span>耗时</span></li>`;
            const data = [{n:"Pluviophile", m:"INFJ", t:"42s"}, {n:state.user, m:state.mbti, t:localStorage.getItem('last_time')}];
            data.forEach(d => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${d.n}</span><span>${d.m}</span><span>${d.t}</span>`;
                list.appendChild(li);
            });
            switchSection('leaderboard-section');
        }
    </script>
</body>
</html>
