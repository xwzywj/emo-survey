<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commit Your Soul - 故障风崩溃版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">
    <canvas id="crash-canvas"></canvas>

    <audio id="emo-audio" src="ding.mp4" preload="auto"></audio>

    <div class="container">
        <header id="welcome-section">
            <h1>Commit Your Soul</h1>
            <p class="subtitle">身份识别中... 正在向深渊上传数据</p>
            <div class="user-input-area">
                <input type="text" id="username" placeholder="输入你的赛博代号..." />
                <button class="btn-primary" onclick="startSystem()">启动系统</button>
            </div>
        </header>

        <section id="choice-section" class="hidden">
            <h2 id="hello-user">你好</h2>
            <div class="nav-buttons">
                <button class="btn-void" onclick="startSurvey('mbti')">
                    <strong>MBTI 深度测量</strong><br><small>28题 / 核心人格映射</small>
                </button>
                <button class="btn-void" onclick="startSurvey('emo')">
                    <strong>虚无主义灰度检测</strong><br><small>20题 / 深度忧郁文案 / 灵魂损耗度分析</small>
                </button>
                <button class="btn-outline" onclick="showProfile()">个人面板</button>
            </div>
        </section>

        <section id="survey-section" class="hidden">
            <div class="header-info">
                <span id="survey-title">正在上传数据...</span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>
            
            <div id="question-card"></div>

            <div class="nav-controls">
                <button id="prev-btn" class="btn-nav" onclick="changeQuestion(-1)">PREV</button>
                <button id="next-btn" class="btn-nav" onclick="changeQuestion(1)">NEXT</button>
                <button id="finish-btn" class="btn-primary hidden" onclick="processSubmit()">UPLOAD TO VOID</button>
            </div>
        </section>

        <section id="profile-section" class="hidden">
            <h2>个人面板</h2>
            <div class="profile-card">
                <p><strong>代号：</strong> <span id="p-name">--</span></p>
                <p><strong>MBTI人格：</strong> <span id="p-mbti" class="tag">未测试</span></p>
                <p><strong>精神状态：</strong> <span id="p-status">未鉴定</span></p>
                <p><strong>最近用时：</strong> <span id="p-time">0s</span></p>
            </div>
            <div id="heart-image-container">
                <img src="image_0.png" alt="比心" onerror="this.style.display='none'">
            </div>
            <div class="nav-buttons">
                <button class="btn-primary" onclick="switchSection('choice-section')">新测试</button>
                <button class="btn-outline" onclick="showLeaderboard()">虚无排行</button>
                <button class="btn-outline" style="color:#f85149" onclick="resetAll()">格式化档案</button>
            </div>
        </section>

        <section id="leaderboard-section" class="hidden">
            <h2>全球排行</h2>
            <ul id="leaderboard-list"></ul>
            <button class="btn-outline" onclick="showProfile()">返回</button>
        </section>
    </div>

    <script>
        // MBTI 28题
        const mbtiQuestions = [
            {q:"你通常在社交聚会后感到精力充沛。", d:"EI"},
            {q:"你更喜欢关注细节和事实，而不是理论。", d:"SN"},
            {q:"你认为逻辑比情感在决策中更可靠。", d:"TF"},
            {q:"你喜欢把事情提前安排得井井有条。", d:"JP"},
            {q:"你更喜欢独自思考，而不是头脑风暴。", d:"EI", rev:true},
            {q:"你经常寻找事物背后的深层含义。", d:"SN", rev:true},
            {q:"你很容易对他人的情绪感同身受。", d:"TF", rev:true},
            {q:"你觉得灵活变通比按计划行事更舒服。", d:"JP", rev:true},
            {q:"在聚会中，你通常是主动找人说话的那方。", d:"EI"},
            {q:"你更信任自己的经验而不是直觉。", d:"SN"},
            {q:"你觉得在职场中“对事不对人”很重要。", d:"TF"},
            {q:"你的桌面和房间通常是整洁的。", d:"JP"},
            {q:"你倾向于在开口前先在脑中想好。", d:"EI", rev:true},
            {q:"你喜欢尝试新奇的、未经验证的点子。", d:"SN", rev:true},
            {q:"你做决定时很难不考虑他人的感受。", d:"TF", rev:true},
            {q:"你更喜欢走一步看一步，而不是死守计划。", d:"JP", rev:true},
            {q:"你喜欢成为话题的中心。", d:"EI"},
            {q:"你对虚构的科幻情节比现实新闻更感兴趣。", d:"SN", rev:true},
            {q:"你认为效率比和睦更重要。", d:"TF"},
            {q:"你习惯于给每天列“待办清单”。", d:"JP"},
            {q:"你觉得过多的社交活动让你疲惫。", d:"EI", rev:true},
            {q:"你擅长注意到环境中的微小变化。", d:"SN"},
            {q:"在冲突中，你更关注谁更有道理。", d:"TF"},
            {q:"你更喜欢自发的旅行而不是详细的攻略。", d:"JP", rev:true},
            {q:"你更喜欢文字沟通而不是电话交流。", d:"EI", rev:true},
            {q:"你倾向于看大局，而不是纠结细节。", d:"SN", rev:true},
            {q:"你被认为是感性且温柔的人。", d:"TF", rev:true},
            {q:"你总是能在截止日期前很久完成任务。", d:"JP"}
        ];

        // 虚无主义 20题（忧郁丧版）
        const emoQuestions = [
            {q:"如果你的生命是一盘磁带，你认为现在的底噪是？", a:"激昂嘈杂的电流声", b:"漫长单调的空白", c:"被磁头缓缓磨损的尖叫"},
            {q:"清晨睁开眼，你的第一反应是？", a:"全新的模拟", b:"不得不继续的苦差", c:"为什么程序还没崩溃"},
            {q:"在人群中，你感到一种‘透明感’吗？", a:"从不", b:"偶尔感到安全", c:"始终只是背景像素"},
            {q:"你如何看待‘努力’这个词？", a:"通往意义的路径", b:"对抗无聊的消遣", c:"给虚无涂抹的劣质油漆"},
            {q:"十年后的你会在这里？", a:"在成就在平庸里", b:"在循环里", c:"Maybe已被删除"},
            {q:"手机电量跳至1%时，你的感觉？", a:"快找线", b:"终于可以失踪了", c:"它死去了，我却还要继续"},
            {q:"向他人倾诉痛苦时，你看到的是？", a:"同情的目光", b:"礼貌的伪装", c:"深渊在另一个深渊里的倒影"},
            {q:"你认为社交对你意味着？", a:"能交换取暖", b:"两孤独相磨损", c:"掩盖腐烂气味的廉价香水"},
            {q:"当你凝视窗外深夜，你在想？", a:"明天任务", b:"远方孤独", c:"黑暗才是真相"},
            {q:"你如何评价目前的自己？", a:"进化中的生命体", b:"损耗旧机器", c:"散落的旧代码"},
            {q:"如果可以重启，你会选择？", a:"更高挑战", b:"修正遗憾", c:"拒不再次进入游戏"},
            {q:"世界末日就在今晚，最后一餐你会选择？", a:"最昂贵珍馐", b:"过期的面包", c:"吞下这沉重的空气"},
            {q:"当你照镜子时，看到的不仅仅是脸，还有？", a:"成长的自我", b:"逐渐陌生的零件", c:"正在加速崩解的荒原"},
            {q:"在城市里，你觉得你是？", a:"奔跑齿轮", b:"沙砾", c:"旁观的幽灵"},
            {q:"深夜雨声听起来像是？", a:"大自然洗礼", b:"世界替你流泪", c:"这星球缓慢腐烂的低语"},
            {q:"最后，你认为你消失后这个世界会？", a:"感到遗憾", b:"像从未有过一样运转", c:"lazy泛起一丝涟漪"},
            {q:"对‘成功’的定义？", a:"发财", b:"躺平", c:"今天没哭"},
            {q:"核心竞争力？", a:"能吃", b:"能睡", c:"能忍虚无"},
            {q:"面对突发任务？", a:"崩溃", b:"推脱", c:"瞎"},
            {q:"你觉得‘家’贴切定义是？", a:"避风港", b:"存放疲惫体箱", c:"合法牢笼"}
        ];

        let state = {
            user: localStorage.getItem('emo_user') || "",
            type: "",
            currentIndex: 0,
            answers: {},
            startTime: 0,
            currentList: []
        };

        function startSystem() {
            const name = document.getElementById('username').value.trim();
            if (!name && !state.user) return alert("灵魂需要代号");
            const audio = document.getElementById('emo-audio');
            audio.play().then(() => { audio.pause(); }).catch(() => {});
            state.user = state.user || name;
            localStorage.setItem('emo_user', state.user);
            showProfile();
        }

        function startSurvey(type) {
            state.type = type;
            state.currentList = type === 'mbti' ? mbtiQuestions : emoQuestions;
            state.currentIndex = 0;
            state.answers = {};
            state.startTime = Date.now();
            renderQuestion();
            switchSection('survey-section');
        }

        function renderQuestion() {
            const q = state.currentList[state.currentIndex];
            const container = document.getElementById('question-card');
            let html = `<div class="question-text">${state.currentIndex + 1}. ${q.q}</div>`;
            
            if (state.type === 'mbti') {
                const opts = ["非常不同意", "不同意", "一般", "同意", "非常同意"];
                html += `<div class="options-container">`;
                opts.forEach((opt, i) => {
                    const checked = state.answers[state.currentIndex] == (i+1) ? 'checked' : '';
                    html += `<label class="opt-label"><input type="radio" name="cur" value="${i+1}" ${checked} onclick="saveAns(${i+1})"> <span>${opt}</span></label>`;
                });
                html += `</div>`;
            } else {
                ["A", "B", "C"].forEach(v => {
                    const checked = state.answers[state.currentIndex] === v ? 'checked' : '';
                    const label = v === "A" ? q.a : (v === "B" ? q.b : q.c);
                    html += `<label class="opt-label"><input type="radio" name="cur" value="${v}" ${checked} onclick="saveAns('${v}')"> <span>${v}. ${label}</span></label>`;
                });
            }
            container.innerHTML = html;
            updateNav();
        }

        function saveAns(v) {
            state.answers[state.currentIndex] = v;
            updateProgress();
        }

        function changeQuestion(dir) {
            state.currentIndex += dir;
            renderQuestion();
        }

        function updateNav() {
            document.getElementById('prev-btn').disabled = state.currentIndex === 0;
            const isLast = state.currentIndex === state.currentList.length - 1;
            document.getElementById('next-btn').classList.toggle('hidden', isLast);
            document.getElementById('finish-btn').classList.toggle('hidden', !isLast);
        }

        function updateProgress() {
            const answered = Object.keys(state.answers).length;
            document.getElementById('progress').style.width = (answered / state.currentList.length) * 100 + '%';
        }

        function processSubmit() {
            if (Object.keys(state.answers).length < state.currentList.length) return alert("请完成所有灵魂扫描");

            const audio = document.getElementById('emo-audio');
            if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
            document.body.classList.add('flash-red');
            setTimeout(() => document.body.classList.remove('flash-red'), 500);

            const duration = ((Date.now() - state.startTime) / 1000).toFixed(1);
            localStorage.setItem('last_time', duration + "s");

            if (state.type === 'mbti') {
                let r = {E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0};
                mbtiQuestions.forEach((q, i) => {
                    const val = parseInt(state.answers[i]);
                    const score = val - 3;
                    const point = q.rev ? -score : score;
                    if (point > 0) r[q.d[0]] += point; else r[q.d[1]] += Math.abs(point);
                });
                const res = (r.E>=r.I?"E":"I")+(r.S>=r.N?"S":"N")+(r.T>=r.F?"T":"F")+(r.J>=r.P?"J":"P");
                localStorage.setItem('mbti_res', res);
            } else {
                let cCount = 0;
                Object.values(state.answers).forEach(v => { if(v==='C') cCount++; });
                let status = "";
                if(cCount >= 15) status = "【灵魂灰度 99% - 纯粹虚无体】";
                else if(cCount >= 8) status = "【慢性崩解中 - 赛博游魂】";
                else if(cCount >= 4) status = "【系统延迟 - 逻辑幸存者】";
                else status = "【伪装成功 - 碳基幸存者】";
                localStorage.setItem('emo_res', status);
            }
            if (state.user.toLowerCase() === "pluviophile") alert("I死了");
            showProfile();
        }

        function showProfile() {
            document.getElementById('p-name').innerText = state.user;
            document.getElementById('p-mbti').innerText = localStorage.getItem('mbti_res') || "未检测";
            document.getElementById('p-status').innerText = localStorage.getItem('emo_res') || "未鉴定";
            document.getElementById('p-time').innerText = localStorage.getItem('last_time') || "0s";
            switchSection('profile-section');
        }

        function switchSection(id) {
            document.querySelectorAll('section, header').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetAll() { if(confirm("格式化后一切归于虚无，确定？")){localStorage.clear(); location.reload();} }

        function showLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = `<li><span>用户</span><span>人格</span><span>用时</span></li>`;
            const d = [{n:"Pluviophile", m:"INFJ", t:"42s"}, {n:state.user, m:localStorage.getItem('mbti_res')||"??", t:localStorage.getItem('last_time')||"0s"}];
            d.forEach(i => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${i.n}</span><span>${i.m}</span><span>${i.t}</span>`;
                list.appendChild(li);
            });
            switchSection('leaderboard-section');
        }

        // ==========================================
        // --- 核心：数据流崩溃背景代码 ---
        // ==========================================
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');

        // 设置全屏
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 字符集：日文假名 + 拉丁字母 + 数字（矩阵风核心）
        const characters = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const charArray = characters.split('');

        // 核心配置
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = []; // 存储每一列数据流的当前Y坐标

        // 初始化所有列都在顶部
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        // 绘制每一帧
        function drawMatrix() {
            // 关键：半透明背景，形成拖影特效，看起来像是在逐渐消失
            ctx.fillStyle = 'rgba(13, 17, 23, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 设置文字颜色（经典赛博绿，如果你喜欢忧郁，可以用 #58a6ff）
            ctx.fillStyle = '#0f0'; // 如果想要忧郁风，替换为 '#58a6ff'
            ctx.font = fontSize + 'px monospace';

            // 循环绘制每一列
            for (let i = 0; i < drops.length; i++) {
                // 随机选取一个字符
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                
                // 绘制字符
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // 让数据流向下掉落。
                // 随机性：如果数据流到了底部，且满足一定概率，或者直接到底了，就回到顶部重新下掉
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // 正常下落
                drops[i]++;
            }
        }

        // 动画循环
        setInterval(drawMatrix, 35); // 约28.5帧/秒，既有流动感又不太刺眼

        // 窗口大小调整时适配 Canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = canvas.width / fontSize;
            // 重新初始化 drops
            for (let i = 0; i < columns; i++) {
                if (drops[i] === undefined) drops[i] = 1;
            }
        });
    </script>
</body>
</html>
