<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚无主义人生系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">
    <audio id="emo-audio" src="ding.mp4" preload="auto"></audio>

    <div class="container">
        <header id="welcome-section">
            <h1>Commit Your Soul</h1>
            <p class="subtitle">检测到未授权灵魂，请初始化代号...</p>
            <div class="user-input-area">
                <input type="text" id="username" placeholder="输入你的赛博代号..." />
                <button type="button" onclick="startSurvey()">进入系统</button>
            </div>
        </header>

        <section id="survey-section" class="hidden">
            <div class="header-info">
                <span id="display-user"></span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>
            <form id="survey-form">
                <div id="questions-container"></div>
                <button type="button" class="btn-primary" onclick="submitSurvey()">上传至虚无</button>
            </form>
        </section>

        <section id="result-section" class="hidden">
            <h3>🔴 System Status: CRITICAL</h3>
            <div id="result-text"></div>
            <div id="heart-image-container">
                <img src="image_0.png" alt="比心">
            </div>
            <button class="btn-void" onclick="showProfile()">通往虚无 (进入主页)</button>
        </section>

        <section id="profile-section" class="hidden">
            <h2>个人虚无面板</h2>
            <div class="profile-card">
                <p><strong>代号：</strong> <span id="p-name"></span></p>
                <p><strong>当前状态：</strong> <span id="p-status"></span></p>
                <p><strong>历史记录：</strong> 1次鉴定已存档</p>
            </div>
            <div class="nav-buttons">
                <button onclick="showLeaderboard()">查看全球排行榜</button>
                <button class="btn-outline" onclick="restartSurvey()">重新鉴定</button>
            </div>
        </section>

        <section id="leaderboard-section" class="hidden">
            <h2>全球虚无值排行榜</h2>
            <ul id="leaderboard-list">
                </ul>
            <button class="btn-outline" onclick="showProfile()">返回面板</button>
        </section>
    </div>

    <script>
        const questions = [
            { q: "起床后的第一念头？", a: "尿急", b: "还没活够", c: "为什么会有早八" },
            { q: "面对期末考，你的策略？", a: "转发锦鲤", b: "试图硬塞知识", c: "原地逃跑" },
            { q: "路上看到不熟的同学？", a: "假装玩手机", b: "低头看脚尖", c: "隐身模式开启" },
            { q: "关于‘今天吃什么’？", a: "批阅外卖软件", b: "吃别人剩下的", c: "光合作用" },
            { q: "十年后的自己？", a: "已被删除", b: "只要活不到那时就没事", c: "在长椅上看世界" },
            { q: "手机电量低于 20% 时？", a: "疯狂找线", b: "听天由命", c: "感到一种解脱" },
            { q: "收到‘在吗’后的反应？", a: "瞬间装死", b: "视奸朋友圈", c: "礼貌性消失" },
            { q: "你的社交状态？", a: "只要我不尴尬", b: "盛大的自闭", c: "只读模式" },
            { q: "周日的晚上在想什么？", a: "明天吃什么", b: "还没开始过周末", c: "世界怎么还没毁灭" },
            { q: "对工作的态度？", a: "为了五斗米", b: "摸鱼专家", c: "电子荒原漂流者" },
            { q: "熬夜的原因？", a: "剧太好看", b: "报复性补偿", c: "灵魂在修仙" },
            { q: "你的存款状态？", a: "四大皆空", b: "恩格尔系数 100%", c: "负资产运行" },
            { q: "面对突发任务？", a: "原地崩溃", b: "熟练推脱", c: "假装没看见" },
            { q: "你的核心竞争力？", a: "能吃", b: "能睡", c: "能忍受虚无" },
            { q: "洗澡时的活动？", a: "思考人生", b: "开演唱会", c: "单纯发呆" },
            { q: "对‘成功’的定义？", a: "发财", b: "躺平", c: "今天没哭" },
            { q: "你的衣柜风格？", a: "那几件轮换", b: "黑色显瘦", c: "穿得像个路人" },
            { q: "关于旅行？", a: "朋友圈一日游", b: "酒店深度游", c: "我想去外星" },
            { q: "面对批评？", a: "瞬间破防", b: "左耳进右耳出", c: "你说得对，但我没救了" },
            { q: "最后，你现在的感觉？", a: "想干饭", b: "想睡觉", c: "我不应该在这里" }
        ];

        let currentUser = localStorage.getItem('emo_user') || "";
        let lastResult = localStorage.getItem('emo_result') || "";

        window.onload = function() {
            // 初始化题目
            const container = document.getElementById('questions-container');
            questions.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'question-group';
                div.innerHTML = `<label>${index + 1}. ${item.q}</label>
                    <div class="options">
                        <input type="radio" name="q${index}" value="A" id="q${index}a" onclick="updateProgress()"> <label for="q${index}a">A. ${item.a}</label><br>
                        <input type="radio" name="q${index}" value="B" id="q${index}b" onclick="updateProgress()"> <label for="q${index}b">B. ${item.b}</label><br>
                        <input type="radio" name="q${index}" value="C" id="q${index}c" onclick="updateProgress()"> <label for="q${index}c">C. ${item.c}</label>
                    </div>`;
                container.appendChild(div);
            });

            // 检查历史状态
            if (currentUser && lastResult) {
                showProfile();
            } else if (currentUser) {
                startSurvey();
            }
        };

        function startSurvey() {
            const inputName = document.getElementById('username').value.trim();
            if (!currentUser && !inputName) return alert("请赐予你的灵魂一个代号");
            if (!currentUser) currentUser = inputName;
            
            localStorage.setItem('emo_user', currentUser);
            document.getElementById('display-user').innerText = "受检者: " + currentUser;
            switchSection('survey-section');
        }

        function updateProgress() {
            const checked = document.querySelectorAll('input[type="radio"]:checked').length;
            document.getElementById('progress').style.width = (checked / questions.length) * 100 + '%';
        }

        function submitSurvey() {
            const checked = document.querySelectorAll('input[type="radio"]:checked');
            if (checked.length < questions.length) return alert("还没填完，别想逃");
            
            if (currentUser.toLowerCase() === "pluviophile") alert("I死了");

            document.getElementById('emo-audio').play().catch(()=>{});
            document.body.classList.add('flash-red');

            let counts = { A: 0, B: 0, C: 0 };
            checked.forEach(i => counts[i.value]++);

            let title = counts.C >= 10 ? "【绝对虚无主义者】" : (counts.B >= counts.A ? "【系统延迟观察者】" : "【生存本能驱动者】");
            lastResult = title;
            localStorage.setItem('emo_result', title);

            document.getElementById('result-text').innerText = "鉴定完成：" + title;
            switchSection('result-section');
        }

        function showProfile() {
            document.getElementById('p-name').innerText = currentUser;
            document.getElementById('p-status').innerText = lastResult;
            switchSection('profile-section');
        }

        function showLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = "";
            const mockUsers = [
                {n: "Pluviophile", r: "【绝对虚无】", v: "99%"},
                {n: "阿珍", r: "【生存驱动】", v: "45%"},
                {n: "代码屠夫", r: "【系统延迟】", v: "72%"},
                {n: currentUser, r: lastResult, v: "计算中..."}
            ];
            mockUsers.forEach(u => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${u.n}</span><span>${u.r}</span>`;
                list.appendChild(li);
            });
            switchSection('leaderboard-section');
        }

        function restartSurvey() {
            localStorage.removeItem('emo_result');
            location.reload();
        }

        function switchSection(id) {
            document.querySelectorAll('section, header').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
